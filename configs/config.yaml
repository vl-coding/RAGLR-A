data:
  processed_path: "data/processed/arxiv_papers.jsonl"
  delta_path: "data/processed/arxiv_delta.jsonl"
  raw_snapshot_path: "data/raw/arxiv-metadata-oai-snapshot.json"
  min_year: null
  max_papers: null
  update_source: "oai_pmh"
  oai_base_url: "https://oaipmh.arxiv.org/oai"
  oai_metadata_prefix: "oai_dc"

retrieval:
  default_top_k: 10
  dense_candidates: 200
  bm25_candidates: 200
  rrf_k: 60
  min_prefilter_candidates: 500
  max_prefilter_candidates: 50000
  target_reduction_min_percent: 86
  target_reduction_max_percent: 99
  canonical_papers_path: "data/canonical_papers.yaml"

models:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  qwen_model: "Qwen/Qwen2.5-0.5B-Instruct"
  claude_model: "claude-sonnet-4-6"
  claude_max_retries: 5
  claude_timeout_seconds: 60
  claude_justifier_max_concurrency: 5

demo:
  rate_limit_requests: 3
  rate_limit_window_seconds: 3600
  limit_message: "Free demo limit reached — {limit} queries per hour. Full access coming soon."

paths:
  dense_index_dir: "artifacts/dense_index"
  bm25_index: "artifacts/bm25_index"
  bm25_delta: "artifacts/bm25_delta"
  keyword_index: "artifacts/keyword_index.sqlite3"
  metadata_db: "artifacts/metadata.sqlite3"
  known_ids: "artifacts/known_ids.npy"
  manifest: "artifacts/manifest.json"
  update_state: "artifacts/update_state.json"
  logs_dir: "logs"
  outputs_dir: "outputs"
