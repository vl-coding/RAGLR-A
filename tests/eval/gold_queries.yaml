# Gold query set for retrieval evaluation.
#
# Each entry is one test query plus a small set of "known-relevant" arxiv_ids
# (canonical/seed papers for that topic, or strong lexical/topical matches
# found via BM25 search over the live corpus). These are used as a
# lower-bound qrels set for:
#   - prefilter recall (does the qwen keyword prefilter drop these ids?)
#   - end-to-end Recall@k / Precision@k / NDCG@k / MRR on the final results
#
# All ids below were verified to exist in data/processed/arxiv_papers.jsonl
# via scripts/_gold_query_helper.py (check / search modes) before being
# added here.

