# Canonical/seminal papers ("signature papers") for well-established CS/ML
# topics. Used by src/rag_lit/canonical_boost.py to give these papers a small
# RRF rank boost when a query's terms match one of their `topics`.
#
# Why this exists: short, decade-old foundational papers (e.g. "Attention Is
# All You Need") often lose to thousands of newer papers on both lexical
# (BM25) and semantic (dense) similarity for queries phrased in modern
# terminology -- see docs/EVALUATION.md "Diagnosing the remaining 4" and
# issue #3. This registry lets a topically-matched canonical paper compete in
# RRF fusion even when it falls outside the dense/BM25 candidate pools.
#
# `topics` are lowercase phrases checked as substrings against the lowercased
# query text and the Qwen-extracted keywords. Papers are ranked by the total
# character length of their matched topic phrases, so longer/more specific
# matches (e.g. "parameter-efficient fine-tuning") outrank short, generic
# ones (e.g. "large language model") -- a higher rank in the canonical
# ranked list means a larger (but still modest) RRF score contribution. This
# is a nudge, not an override: a single rank-1 canonical match contributes
# ~1/(rrf_k+1), well below what a paper that ranks well in *both* retrievers
# already earns.

